<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Pot - Ingredients Pantry</title>
    <link rel="stylesheet" href="/src/index.css" />
  </head>
  <body class="min-h-screen flex flex-col bg-slate-50 text-slate-900 font-sans relative">
    <!-- Refrigerator Background Image Backdrop -->
    <div class="fixed inset-0 z-0 pointer-events-none opacity-22 dark:opacity-12" style="background-image: url('https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&q=80&w=1600'); background-size: cover; background-position: center; background-repeat: no-repeat;"></div>

    <!-- Navbar Container -->
    <div id="navbar" class="relative z-10"></div>

    <!-- Main Section -->
    <main class="flex-1 max-w-6xl mx-auto w-full px-4 py-8 sm:px-6 animate-fade-in relative z-10">
      <!-- Vertical floating borderless background emojis -->
      <div class="hidden xl:block absolute -left-20 top-[10%] spinning-carrot text-3xl pointer-events-none select-none" style="animation-duration: 12s;">🍎</div>
      <div class="hidden xl:block absolute -right-20 top-[25%] spinning-carrot text-3xl pointer-events-none select-none" style="animation-duration: 16s; animation-direction: reverse;">🥦</div>
      <div class="hidden xl:block absolute -left-24 top-[50%] spinning-carrot text-3xl pointer-events-none select-none" style="animation-duration: 14s;">🍊</div>
      <div class="hidden xl:block absolute -right-24 top-[70%] spinning-carrot text-3xl pointer-events-none select-none" style="animation-duration: 20s; animation-direction: reverse;">🍉</div>
      <div class="hidden xl:block absolute -left-20 top-[88%] spinning-carrot text-4xl pointer-events-none select-none" style="animation-duration: 17s;">🥬</div>

      <!-- Title Block -->
      <div class="mb-10 flex flex-col lg:flex-row lg:items-center lg:justify-between gap-6 relative">
        <div class="flex items-start gap-4">
          <div>
            <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[10px] font-extrabold bg-slate-950 text-white border border-slate-950 dark:text-amber-150 dark:bg-amber-400/15 dark:border-amber-400/20 uppercase tracking-widest font-mono mb-2">
              <span class="spinning-carrot text-[10px]" style="animation-duration: 4s;">🍉</span> Premium Culinary Selection <span class="spinning-carrot text-[10px]" style="animation-duration: 5s; animation-direction: reverse;">🥬</span>
            </span>
            <h1 class="font-display font-black text-3xl sm:text-4xl tracking-tight text-slate-900 dark:text-slate-100 flex items-center gap-2">
              Ingredients Pantry
            </h1>
            <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">
              Tap or click any ingredient card to instantly add it to your stocked kitchen pantry.
            </p>
          </div>
        </div>

        <!-- Quick Counters Card -->
        <div class="ink-stamped-card bg-white px-5 py-4 flex items-center gap-6 shrink-0 justify-between sm:justify-start">
          <div class="text-center sm:text-left">
            <span class="block text-[9px] uppercase tracking-wider font-extrabold text-slate-400 dark:text-slate-550 font-mono">Pantry Stock</span>
            <span id="pantry-count-badge" class="font-mono text-2xl font-black text-slate-850 dark:text-amber-400">0</span>
            <span class="text-xs font-bold text-slate-500 dark:text-slate-400">items</span>
          </div>
          <div class="h-8 border-l border-slate-200 dark:border-slate-800"></div>
          <div class="flex gap-2 items-center">
            <button 
              id="clear-pantry-btn" 
              class="ink-stamped-btn px-4 py-2 bg-red-50/50 hover:bg-red-50 text-red-555 dark:text-red-400 rounded-xl font-bold text-xs cursor-pointer border-red-200/50 dark:border-red-900/30 font-sans"
            >
              Clear Pantry
            </button>
            <a href="index.html" class="ink-stamped-btn px-4 py-2 bg-slate-50 dark:bg-slate-900 text-slate-705 dark:text-slate-300 rounded-xl font-bold text-xs font-sans">
              View Pantry
            </a>
            <a href="search.html" class="ink-stamped-btn px-4 py-2 bg-slate-900 hover:bg-slate-950 text-white dark:bg-amber-400 dark:hover:bg-amber-505 dark:text-slate-950 rounded-xl font-bold text-xs font-sans">
              Match Recipes ➔
            </a>
          </div>
        </div>
      </div>

      <!-- Filter/Search Bar Bento Module -->
      <div class="ink-stamped-card bg-white p-5 mb-8 flex flex-col md:flex-row items-center gap-4">
        <label for="search-pantry" class="sr-only">Search pantry ingredients</label>
        <div class="relative w-full md:flex-1">
          <input 
            type="text" 
            id="search-pantry" 
            placeholder="Search ingredient by label... (e.g. Garlic, Cream, Onion)" 
            class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-950/40 border border-slate-200 dark:border-slate-800 rounded-xl focus:bg-white dark:focus:bg-slate-950 focus:outline-hidden focus:ring-1 focus:ring-slate-900 dark:focus:ring-amber-400 text-xs sm:text-sm text-slate-800 dark:text-slate-200 placeholder-slate-400 dark:placeholder-slate-550 transition"
            autocomplete="off"
          />
          <span class="absolute left-3.5 top-3.5 text-slate-400">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
          </span>
        </div>

        <!-- Quick filter buttons -->
        <div class="flex gap-2 w-full md:w-auto overflow-x-auto pb-1 sm:pb-0 shrink-0">
          <button id="btn-filt-all" class="ink-stamped-btn px-3.5 py-2 text-xs font-bold bg-slate-900 text-white cursor-pointer select-none">
            All Categories
          </button>
          <button id="btn-filt-stocked" class="ink-stamped-btn px-3.5 py-2 text-xs font-bold bg-slate-50 dark:bg-slate-900 text-slate-600 dark:text-slate-300 cursor-pointer flex items-center gap-1 select-none">
            <span>📦</span> Stocked Only
          </button>
        </div>
      </div>

      <!-- Ingredients Layout Sections -->
      <div id="pantry-grid" class="space-y-12">
        <!-- Dyn Categories drawn by typescript -->
      </div>
    </main>

    <!-- Footer Content -->
    <div id="footer" class="relative z-10"></div>

    <script type="module" src="/src/ingredients.ts"></script>
  </body>
</html>
